services:
  mysql:
    image: mysql:8.4
    container_name: paytrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: paytrack_root_password
      MYSQL_DATABASE: paytrack
      MYSQL_USER: paytrack_user
      MYSQL_PASSWORD: paytrack_password
    ports:
      - "3306:3306"
    volumes:
      - paytrack_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  paytrack_mysql_data:
